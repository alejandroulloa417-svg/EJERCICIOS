<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios JavaScript</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 30px;
        }

        .contenedor{
            max-width: 750px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #0077b6;
        }

        label{
            font-weight: bold;
            color: #333;
        }

        select,
        input{
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 2px solid #90e0ef;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0077b6;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover{
            background: #023e8a;
        }

        #btnTest{
            background: #00b4d8;
        }

        #btnTest:hover{
            background: #0096c7;
        }

        #resultado{
            margin-top: 20px;
            padding: 15px;
            background: #caf0f8;
            border-left: 5px solid #0077b6;
            border-radius: 8px;
            font-size: 18px;
            color: #03045e;
            min-height: 40px;
        }

    </style>
</head>
<body>

    <div class="contenedor">

        <h1>Ejercicios de Arrays</h1>

        <label>Selecciona un ejercicio:</label>

        <select id="opcion">
            <option value="duplicados">Eliminar Duplicados</option>
            <option value="ordenar">Ordenar Vector</option>
            <option value="producto">Producto Total</option>
            <option value="vocales">Contar Vocales</option>
        </select>

        <input 
            type="text"
            id="entrada"
            placeholder="Ingresa valores separados por comas"
        >

        <button id="ejecutar">
            Ejecutar
        </button>

        <!-- BOTON TEST -->
        <button id="btnTest">
            Ejecutar Tests
        </button>

        <div id="resultado"></div>

    </div>

    <!-- INPUTS OCULTOS -->
    <input type="hidden" id="duplicatesInput">
    <input type="hidden" id="sortInput">
    <input type="hidden" id="productInput">
    <input type="hidden" id="lettersInput">

    <script type="module">

        import {
            procesarDuplicados,
            procesarOrdenamiento,
            procesarProducto,
            contarVocales
        } from "./ejercicios.js";

        const boton = document.getElementById("ejecutar");

        boton.addEventListener("click", () => {

            const opcion = document.getElementById("opcion").value;
            const entrada = document.getElementById("entrada").value;

            // Pasar valor a inputs ocultos
            document.getElementById("duplicatesInput").value = entrada;
            document.getElementById("sortInput").value = entrada;
            document.getElementById("productInput").value = entrada;
            document.getElementById("lettersInput").value = entrada;

            // Limpiar resultado anterior
            document.getElementById("resultado").innerHTML = "";

            // Ejecutar ejercicio
            if(opcion === "duplicados"){
                procesarDuplicados();
            }

            if(opcion === "ordenar"){
                procesarOrdenamiento();
            }

            if(opcion === "producto"){
                procesarProducto();
            }

            if(opcion === "vocales"){
                contarVocales();
            }

        });

        // BOTON TEST
        document
            .getElementById("btnTest")
            .addEventListener("click", () => {

                alert("Los tests se ejecutan desde la terminal usando: npm test");

            });

    </script>

</body>
</html>
